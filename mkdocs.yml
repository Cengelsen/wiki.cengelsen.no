site_name: wiki.cengelsen.no
site_url: https://wiki.cengelsen.no/

repo_url: https://github.com/Cengelsen/wiki.cengelsen.no/
edit_uri: blob/master/docs/

theme:
  name: mkdocs
  color_mode: auto
  user_color_mode_toggle: true
  locale: en
  highlightjs: true
  hljs_languages:
    - yaml
    - python
    - bash

nav:
  - Home: index.md
  - Instrukser: instrukser/index.md


extra_css:
  - css/extra.css

exclude_docs: |
  *.py

markdown_extensions:
  - toc:
      permalink: true
  - attr_list
  - def_list
  - tables
  - pymdownx.highlight:
      use_pygments: false
  - pymdownx.snippets
  - pymdownx.superfences
  - callouts

plugins:
  - search
